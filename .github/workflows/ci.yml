name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build python3 python3-pip

      - name: Install Python dependencies
        run: pip3 install -e . --break-system-packages

      - name: Build C++ engine
        run: |
          cmake -S cpp -B cpp/build -G Ninja
          cmake --build cpp/build

      - name: Run C++ tests
        run: cd cpp/build && ctest --output-on-failure

      - name: Run Python tests
        run: python3 -m pytest python/ -v