# Binance USDT-M Futures fee schedule
# Rates are fractions of notional (e.g. 0.0004 = 0.04%)
# Negative maker_fee = rebate (you receive money for providing liquidity)
#
# Reference: https://www.binance.com/en/fee/futureFee (VIP 0 as of 2025)

default: &default
  maker_fee: -0.0001   # -0.01% rebate
  taker_fee:  0.0004   #  0.04% cost

scenarios:
  naive:
    maker_fee: 0.0
    taker_fee: 0.0
    description: "No fees — upper bound on gross PnL"

  binance_vip0:
    <<: *default
    description: "Binance VIP 0 (standard retail)"

  binance_vip1:
    maker_fee: -0.0002   # -0.02% rebate
    taker_fee:  0.0002   #  0.02% cost
    description: "Binance VIP 1 (~$5M 30-day volume)"

  binance_vip5:
    maker_fee: -0.0004   # -0.04% rebate
    taker_fee:  0.0000   #  0.00% cost
    description: "Binance VIP 5 — taker free, maker rebate"

  taker_only:
    maker_fee: 0.0004    # pay taker even when maker (conservative)
    taker_fee: 0.0004
    description: "Pessimistic: always pay taker rate"
