<svg width="100%" viewBox="0 0 680 620" role="img" xmlns="http://www.w3.org/2000/svg">
<title>MicrostructureLab architecture</title>
<style>
.box{fill:#f1efe8;stroke:#5f5e5a;stroke-width:0.5}
.th{font-family:sans-serif;font-size:14px;font-weight:500;fill:#2c2c2a}
.ts{font-family:sans-serif;font-size:12px;fill:#5f5e5a}
.teal{fill:#e1f5ee;stroke:#0f6e56;stroke-width:0.5}
.purple{fill:#eeedfe;stroke:#534ab7;stroke-width:0.5}
.blue{fill:#e6f1fb;stroke:#185fa5;stroke-width:0.5}
.gray{fill:#f1efe8;stroke:#5f5e5a;stroke-width:0.5}
.arr{fill:none;stroke:#888780;stroke-width:1.2}
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<rect class="teal" x="40" y="40" width="160" height="56" rx="8"/>
<text class="th" x="120" y="62" text-anchor="middle" dominant-baseline="central">Binance L2 feed</text>
<text class="ts" x="120" y="80" text-anchor="middle" dominant-baseline="central">WebSocket + REST</text>

<rect class="teal" x="260" y="40" width="160" height="56" rx="8"/>
<text class="th" x="340" y="62" text-anchor="middle" dominant-baseline="central">Tardis historical</text>
<text class="ts" x="340" y="80" text-anchor="middle" dominant-baseline="central">Full-day CSV datasets</text>

<line x1="120" y1="96" x2="120" y2="140" class="arr" marker-end="url(#arrow)"/>
<line x1="340" y1="96" x2="340" y2="140" class="arr" marker-end="url(#arrow)"/>
<line x1="120" y1="168" x2="220" y2="168" class="arr" marker-end="url(#arrow)"/>
<line x1="340" y1="168" x2="270" y2="168" class="arr" marker-end="url(#arrow)"/>

<rect class="gray" x="195" y="140" width="170" height="56" rx="8"/>
<text class="th" x="280" y="162" text-anchor="middle" dominant-baseline="central">Normalizer</text>
<text class="ts" x="280" y="180" text-anchor="middle" dominant-baseline="central">Parquet · seq · side · price</text>

<line x1="280" y1="196" x2="280" y2="240" class="arr" marker-end="url(#arrow)"/>

<rect class="purple" x="150" y="240" width="260" height="56" rx="8"/>
<text class="th" x="280" y="262" text-anchor="middle" dominant-baseline="central">C++ order book engine</text>
<text class="ts" x="280" y="280" text-anchor="middle" dominant-baseline="central">34M events/sec · p99 latency · Catch2</text>

<line x1="230" y1="296" x2="160" y2="340" class="arr" marker-end="url(#arrow)"/>
<line x1="330" y1="296" x2="400" y2="340" class="arr" marker-end="url(#arrow)"/>

<rect class="blue" x="40" y="340" width="220" height="56" rx="8"/>
<text class="th" x="150" y="362" text-anchor="middle" dominant-baseline="central">Feature pipeline</text>
<text class="ts" x="150" y="380" text-anchor="middle" dominant-baseline="central">OFI · depth imbal · micro-price</text>

<rect class="purple" x="400" y="340" width="240" height="56" rx="8"/>
<text class="th" x="520" y="362" text-anchor="middle" dominant-baseline="central">C++ execution sim</text>
<text class="ts" x="520" y="380" text-anchor="middle" dominant-baseline="central">Fees · latency · queue model</text>

<line x1="150" y1="396" x2="150" y2="440" class="arr" marker-end="url(#arrow)"/>

<rect class="blue" x="40" y="440" width="220" height="56" rx="8"/>
<text class="th" x="150" y="462" text-anchor="middle" dominant-baseline="central">Ridge model</text>
<text class="ts" x="150" y="480" text-anchor="middle" dominant-baseline="central">IC=0.26 · NW t=54 · purged CV</text>

<line x1="260" y1="468" x2="398" y2="390" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="345" y="423" text-anchor="middle">signal</text>

<line x1="150" y1="496" x2="150" y2="540" class="arr" marker-end="url(#arrow)"/>
<line x1="520" y1="396" x2="520" y2="540" class="arr" marker-end="url(#arrow)"/>

<rect class="gray" x="40" y="540" width="180" height="56" rx="8"/>
<text class="th" x="130" y="562" text-anchor="middle" dominant-baseline="central">Validation report</text>
<text class="ts" x="130" y="580" text-anchor="middle" dominant-baseline="central">IC decay · Brier · def. Sharpe</text>

<rect class="gray" x="400" y="540" width="240" height="56" rx="8"/>
<text class="th" x="520" y="562" text-anchor="middle" dominant-baseline="central">Execution report</text>
<text class="ts" x="520" y="580" text-anchor="middle" dominant-baseline="central">PnL · fee drag · markouts</text>
</svg>
